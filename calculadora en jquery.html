<!DOCTYPE html>
<html>
<head>
    <title>Calculadora con jQuery</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f0f2f5; }
        .calc-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 320px; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        input, select, button { width: 100%; margin: 8px 0; padding: 12px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .btn-calcular { background-color: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-calcular:hover { background-color: #0056b3; }
        .btn-limpiar { background-color: #6c757d; color: white; border: none; cursor: pointer; margin-top: 5px; }
        #resultado { margin-top: 20px; padding: 10px; text-align: center; font-size: 1.2em; border-radius: 6px; background-color: #e9ecef; min-height: 25px; }
    </style>
</head>
<body>

<div class="calc-container">
    <h2 style="text-align:center; color:#333;">Calculadora jQuery</h2>
    
    <input type="number" id="num1" placeholder="Número 1" step="any">
    <input type="number" id="num2" placeholder="Número 2" step="any">
    
    <select id="operacion">
        <option value="suma">Suma (+)</option>
        <option value="resta">Resta (-)</option>
        <option value="multi">Multiplicación (×)</option>
        <option value="divi">División (÷)</option>
    </select>

    <button id="btnCalcular" class="btn-calcular">Calcular</button>
    <button id="btnLimpiar" class="btn-limpiar">Limpiar pantalla</button>

    <div id="resultado">Esperando datos...</div>
</div>

<script>
    $(document).ready(function() {

        $('#btnCalcular').click(function() {
            const n1 = parseFloat($('#num1').val());
            const n2 = parseFloat($('#num2').val());
            const op = $('#operacion').val();
            const $pantalla = $('#resultado'); 

            if (isNaN(n1) || isNaN(n2)) {
                $pantalla.css('color', 'red').text("Ingresa números válidos");
                return;
            }

            let res;
            if (op === 'suma') res = n1 + n2;
            else if (op === 'resta') res = n1 - n2;
            else if (op === 'multi') res = n1 * n2;
            else if (op === 'divi') {
                if (n2 === 0) {
                    $pantalla.css('color', 'red').text("No se puede dividir por 0");
                    return;
                }
                res = n1 / n2;
            }

            const resultadoLimpio = parseFloat(res.toFixed(2));

            $pantalla.css('color', '#333').html(`Resultado: <strong>${resultadoLimpio}</strong>`);
        });

        $('#btnLimpiar').click(function() {
            $('#num1').val("");
            $('#num2').val("");
            $('#operacion').val("suma"); 
            $('#resultado').css('color', '#333').text("Esperando datos...");
        });

    });
</script>

</body>
</html>
